name: Build Windows Release (Qt5/MSVC)

on:
  workflow_dispatch:
  push:
    branches: [ main, work, codex/task-title ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows-msvc:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip aqtinstall
          choco install ninja -y

      - name: Install Qt 5.15.2 (MSVC)
        shell: pwsh
        run: |
          aqt install-qt -O C:\Qt windows desktop 5.15.2 win64_msvc2019_64

      - name: Validate backend endpoints
        shell: pwsh
        run: |
          if (Select-String -Path "MainWindow.cpp","WebSocketClient.cpp" -Pattern "pcpapc172" -SimpleMatch -Quiet) {
            throw "Found deprecated backend domain 'pcpapc172' in source files"
          }

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="C:/Qt/5.15.2/msvc2019_64"

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel

      - name: Deploy Qt runtime (DLLs/plugins/resources)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $version = "1.4.0.0"
          $distRoot = "dist/build_$version"
          $distBin = "$distRoot"
          New-Item -ItemType Directory -Force -Path $distBin | Out-Null

          $exeCandidates = @(
            "build/NoveoDesktop.exe",
            "build/Release/NoveoDesktop.exe"
          )
          $exePath = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $exePath) {
            throw "NoveoDesktop.exe not found. Checked: $($exeCandidates -join ', ')"
          }

          Copy-Item $exePath "$distBin/NoveoDesktop.exe" -Force
          if (Test-Path "web_assets") {
            Copy-Item "web_assets" "$distRoot/web_assets" -Recurse -Force
          }

          & "C:/Qt/5.15.2/msvc2019_64/bin/windeployqt.exe" --release --compiler-runtime "$distBin/NoveoDesktop.exe"

          $repo = "bargmy/NoveoCPP"
          $tag = "ssl"
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $release = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/$repo/releases/tags/$tag"
          $sslAsset = $release.assets | Where-Object { $_.name -eq 'libssl-1_1-x64.dll' } | Select-Object -First 1
          $cryptoAsset = $release.assets | Where-Object { $_.name -eq 'libcrypto-1_1-x64.dll' } | Select-Object -First 1

          if (-not $sslAsset -or -not $cryptoAsset) {
            Write-Host "Assets found in release '$tag':"
            $release.assets | Select-Object name, browser_download_url | Format-Table -AutoSize
            throw "Required OpenSSL assets were not found in release '$tag'"
          }

          Invoke-WebRequest -Headers $headers -Uri $sslAsset.url -OutFile "$distBin/libssl-1_1-x64.dll"
          Invoke-WebRequest -Headers $headers -Uri $cryptoAsset.url -OutFile "$distBin/libcrypto-1_1-x64.dll"
          Write-Host "Bundled OpenSSL DLLs from release '$tag':"
          Get-Item "$distBin/libssl-1_1-x64.dll", "$distBin/libcrypto-1_1-x64.dll" | Select-Object FullName, Length | Format-Table -AutoSize

          Write-Host "Files matched for removal before packaging:"
          $filesToRemove = Get-ChildItem -Path $distRoot -Recurse -File | Where-Object {
            $_.Name -like 'vcredist*.exe' -or $_.Name -like 'vc_redist*.exe' -or $_.Name -eq 'opengl32.dll' -or $_.Name -eq 'opengl32sw.dll'
          }
          $filesToRemove | Select-Object FullName, Length | Format-Table -AutoSize

          if ($filesToRemove) {
            $filesToRemove | Remove-Item -Force
          }

          $remainingForbidden = Get-ChildItem -Path $distRoot -Recurse -File | Where-Object {
            $_.Name -like 'vcredist*.exe' -or $_.Name -like 'vc_redist*.exe' -or $_.Name -eq 'opengl32.dll' -or $_.Name -eq 'opengl32sw.dll'
          }

          if ($remainingForbidden) {
            Write-Host "Forbidden files still present after cleanup:"
            $remainingForbidden | Select-Object FullName, Length | Format-Table -AutoSize
            throw "Packaging cleanup failed"
          }

      - name: Package zip
        shell: pwsh
        run: |
          $version = "1.4.0.0"
          $zipName = "build_$version.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path "dist/build_$version/*" -DestinationPath $zipName -CompressionLevel Optimal
          Get-Item $zipName | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build_1.4.0.0_windows
          path: build_1.4.0.0.zip

      - name: Publish release asset on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build_1.4.0.0.zip

      - name: Upload release zip to Telegram
        shell: pwsh
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          TG_CHANNEL_ID: ${{ secrets.TG_CHANNEL_ID }}
        run: |
          $ErrorActionPreference = "Stop"
          $caption = "NoveoCPP release ${{ github.ref_name }}"
          curl.exe -sS -X POST "https://api.telegram.org/bot$env:BOT_TOKEN/sendDocument" `
            -F "chat_id=$env:TG_CHANNEL_ID" `
            -F "caption=$caption" `
            -F "document=@build_1.4.0.0.zip"
